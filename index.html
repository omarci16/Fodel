    // Mobile breakpoint hook
    const useIsMobile = () => {
      const [mob, setMob] = React.useState(() => window.innerWidth < 768);
      React.useEffect(() => {
        const fn = () => setMob(window.innerWidth < 768);
        window.addEventListener('resize', fn, { passive: true });
        return () => window.removeEventListener('resize', fn);
      }, []);
      return mob;
    };

    // Scroll reveal hook
    const useReveal = () => {
      const ref = React.useRef(null);
      const [vis, setVis] = React.useState(false);
      React.useEffect(() => {
        const el = ref.current; if (!el) return;
        const obs = new IntersectionObserver(
          ([e]) => { if (e.isIntersecting) { setVis(true); obs.disconnect(); } },
          { threshold: 0.08 }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return [ref, vis];
    };

    const Reveal = ({ children, delay = 0, style = {} }) => {
      const [ref, vis] = useReveal();
      return (

          opacity: vis ? 1 : 0,
          transform: vis ? 'none' : 'translateY(30px)',
          transition: `opacity 0.95s cubic-bezier(0.25,0.1,0.25,1) ${delay * 0.14}s,

              <blockquote style={{ fontFamily: 'var(--serif)', fontStyle: 'italic', fontWeight: 300, fontSize: mob ? 'clamp(19px, 5vw, 26px)' : 'clamp(22px, 2.4vw, 36px)', lineHeight: 1.55, color: 'var(--cream)', marginBottom: mob ? '28px' : '48px' }}>
                „Almere-Buitenben élve láttuk, hogy a hollandok mennyire vágynak autentikus európai életmódra — míg Magyarországon a legjobb ingatlanok ismeretlenül várnak gazdára."
              </blockquote>
              <GoldRule center style={{ marginBottom: '24px' }} />
              <div style={{ fontFamily: 'var(--sans)', fontWeight: 300, fontSize: '10px', letterSpacing: '0.28em', textTransform: 'uppercase', color: 'rgba(236,237,239,0.9)' }}>FODEL INGATLAN — fodel.nl</div>
            </div>
          </Reveal>
        </section>

        {/* VALUES */}
        <section style={{ padding: mob ? '48px 24px' : '108px 80px', borderBottom: '1px solid var(--border)' }}>
          <Reveal>
            <div style={{ textAlign: 'center', marginBottom: mob ? '32px' : '80px' }}>
              <Eyebrow center style={{ marginBottom: '12px' }}>Értékeink</Eyebrow>
              <h2 style={{ fontFamily: 'var(--serif)', fontWeight: 400, fontSize: mob ? 'clamp(24px, 7vw, 34px)' : 'clamp(32px, 3.5vw, 54px)', color: 'var(--ink)' }}>Amire minden munkánkban támaszkodunk</h2>
            </div>
          </Reveal>
          <div style={{ display: 'grid', gridTemplateColumns: mob ? '1fr' : 'repeat(3, 1fr)' }}>
            {[
              { num: '01', title: 'Diszkréció', body: 'Az eladók és vevők adatait a legnagyobb diszkrécióval kezeljük. Az ingatlan és a tulajdonos személyes adatai nem kerülnek illetéktelen kezekbe — ez alapelvünk.' },
              { num: '02', title: 'Átláthatóság', body: 'Nincsenek rejtett díjak, nincsenek meglepetések. A jutalék mértéke előre rögzített; a folyamat minden lépésénél tájékoztatjuk ügyfeleinket.' },
              { num: '03', title: 'Tapasztalat', body: '2013 óta több száz tranzakciót bonyolítottunk le sikeresen. Ismerjük mindkét piac jogi hátterét, szokásait és a külföldi vevők elvárásait.' },
            ].map((v, i) => (
              <Reveal key={v.num} delay={i + 1}>
                <div style={{ padding: mob ? '24px 0' : '48px 52px', borderRight: (!mob && i < 2) ? '1px solid var(--border)' : 'none', borderTop: '2px solid var(--accent)', ...(mob && i < 2 ? { borderBottom: '1px solid var(--border)' } : {}) }}>
                  <div style={{ fontFamily: 'var(--serif)', fontWeight: 300, fontSize: mob ? '40px' : '52px', color: 'var(--accent)', opacity: 0.45, lineHeight: 1, marginBottom: mob ? '14px' : '28px' }}>{v.num}</div>
                  <h3 style={{ fontFamily: 'var(--serif)', fontWeight: 500, fontSize: mob ? '19px' : '23px', color: 'var(--ink)', marginBottom: '12px' }}>{v.title}</h3>
                  <p style={{ fontFamily: 'var(--sans)', fontWeight: 300, fontSize: '14px', lineHeight: 1.85, color: 'var(--taupe)' }}>{v.body}</p>
                </div>
              </Reveal>
            ))}
          </div>
        </section>

        {/* STATS */}
        <section style={{ background: 'var(--linen)', borderTop: '1px solid var(--border)', borderBottom: '1px solid var(--border)', padding: mob ? '36px 24px' : '64px 80px' }}>
          <div style={{ display: 'grid', gridTemplateColumns: mob ? 'repeat(2, 1fr)' : 'repeat(4, 1fr)' }}>
            {[
              { value: '2013', label: 'Alapítva' },
              { value: '9',    label: 'Ország' },
              { value: '5',    label: 'Nyelv' },
              { value: '13+',  label: 'Év tapasztalat' },
            ].map((s, i) => (
              <Reveal key={s.label} delay={i + 1}>
                <div style={{
                  textAlign: 'center', padding: mob ? '20px 12px' : '24px',
                  borderRight: mob ? (i % 2 === 0 ? '1px solid var(--border)' : 'none') : (i < 3 ? '1px solid var(--border)' : 'none'),
                  borderBottom: mob && i < 2 ? '1px solid var(--border)' : 'none',
                }}>
                  <div style={{ fontFamily: 'var(--serif)', fontWeight: 300, fontSize: mob ? 'clamp(36px, 9vw, 52px)' : 'clamp(44px, 4.5vw, 68px)', color: 'var(--ink)', lineHeight: 1, marginBottom: '8px' }}>{s.value}</div>
                  <div style={{ fontFamily: 'var(--sans)', fontWeight: 300, fontSize: '10px', letterSpacing: '0.22em', textTransform: 'uppercase', color: 'var(--taupe)' }}>{s.label}</div>
                </div>
              </Reveal>
            ))}
          </div>
        </section>

        {/* STORY / APPROACH */}
        <section style={{ display: 'grid', gridTemplateColumns: mob ? '1fr' : '1fr 1fr', borderBottom: '1px solid var(--border)' }}>
          <div style={{ padding: mob ? '40px 24px' : '88px 72px 88px 80px', display: 'flex', flexDirection: 'column', justifyContent: 'center', borderBottom: mob ? '1px solid var(--border)' : 'none' }}>
            <Reveal>
              <Eyebrow style={{ marginBottom: '16px' }}>A mi megközelítésünk</Eyebrow>
              <h2 style={{ fontFamily: 'var(--serif)', fontWeight: 400, fontSize: mob ? 'clamp(24px, 7vw, 34px)' : 'clamp(28px, 2.8vw, 42px)', color: 'var(--ink)', lineHeight: 1.2, marginBottom: mob ? '18px' : '28px' }}>
                Nem vagyunk nagy iroda.<br /><em style={{ fontStyle: 'italic' }}>Ez az előnyünk.</em>
              </h2>
              <GoldRule style={{ marginBottom: mob ? '18px' : '28px' }} />
              <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                {[
                  'Minden ügyféllel személyesen foglalkozunk — nincs call center, nincs anonim ügyintézés.',
                  'Mindkét kultúrát belülről ismerjük: holland és magyar szemmel egyaránt értékeljük az ingatlanokat.',
                  'Az ingatlan és a vevő összeillesztése a mi felelősségünk — nem a szerencsén múlik.',
                  'Kizárólagossági szerződés nélkül dolgozunk, mert bízunk abban, hogy eredménnyel bizonyítunk.',
                ].map((pt, i) => (
                  <div key={i} style={{ display: 'flex', gap: '16px', alignItems: 'flex-start' }}>
                    <div style={{ width: '20px', height: '1px', background: 'var(--accent)', marginTop: '11px', flexShrink: 0 }} />
                    <p style={{ fontFamily: 'var(--sans)', fontWeight: 300, fontSize: '14px', lineHeight: 1.8, color: 'var(--taupe)' }}>{pt}</p>
                  </div>
                ))}
              </div>
            </Reveal>
          </div>
          <div style={{ background: 'var(--linen)', borderLeft: mob ? 'none' : '1px solid var(--border)', padding: mob ? '40px 24px' : '88px 80px', display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
            <Reveal>
              <Eyebrow style={{ marginBottom: '16px' }}>Almere-Buiten, Flevoland</Eyebrow>
              <h2 style={{ fontFamily: 'var(--serif)', fontWeight: 400, fontSize: mob ? 'clamp(24px, 7vw, 34px)' : 'clamp(28px, 2.8vw, 42px)', color: 'var(--ink)', lineHeight: 1.2, marginBottom: mob ? '18px' : '28px' }}>
                A híd, amelyet<br /><em style={{ fontStyle: 'italic' }}>megépítettünk</em>
              </h2>
              <GoldRule style={{ marginBottom: mob ? '18px' : '28px' }} />
              <p style={{ fontFamily: 'var(--sans)', fontWeight: 300, fontSize: '14px', lineHeight: 1.9, color: 'var(--taupe)', marginBottom: '18px' }}>
                A FODEL Hollandiában élő magyarok által alapított ingatlanközvetítő iroda. Almere-Buitenben indultunk el 2013-ban, ahol rájöttünk: rengeteg holland és belga érdeklődő szeretne autentikus magyar ingatlant vásárolni — de nem tudja, hogyan fogjon hozzá.
              </p>
              <p style={{ fontFamily: 'var(--sans)', fontWeight: 300, fontSize: '14px', lineHeight: 1.9, color: 'var(--taupe)', marginBottom: '18px' }}>
                Ma 9 országban hirdetünk, 5 nyelven — és minden tranzakciót elejétől a végéig kísérünk. Kétnyelvű adásvételi szerződéssel, meghatalmazásos képviselettel, földhivatali ügyintézéssel.
              </p>
              <p style={{ fontFamily: 'var(--sans)', fontWeight: 300, fontSize: '13px', lineHeight: 1.75, color: 'var(--taupe)', opacity: 0.7 }}>
                Flevoland, Hollandia · info@fodel.nl
              </p>
            </Reveal>
          </div>
        </section>

        {/* CTA BAND */}
        <section style={{ background: 'var(--linen)', borderTop: '1px solid var(--border)', padding: mob ? '44px 24px' : '72px 80px', display: 'flex', flexDirection: mob ? 'column' : 'row', justifyContent: 'space-between', alignItems: mob ? 'stretch' : 'center', gap: mob ? '24px' : '0' }}>
          <Reveal>
            <div>
              <h2 style={{ fontFamily: 'var(--serif)', fontWeight: 400, fontSize: mob ? 'clamp(24px, 7vw, 34px)' : 'clamp(26px, 2.8vw, 42px)', color: 'var(--ink)', marginBottom: '8px' }}>Dolgozzunk együtt!</h2>
              <p style={{ fontFamily: 'var(--sans)', fontWeight: 300, fontSize: '14px', color: 'var(--taupe)' }}>Munkanapokon 08:00–18:00 · A visszahívás ingyenes.</p>
            </div>
          </Reveal>
          <Reveal delay={2}>
            <div style={{ display: 'flex', flexDirection: mob ? 'column' : 'row', gap: mob ? '12px' : '16px', flexShrink: 0 }}>
              <BtnDark onClick={() => navigate('contact')} style={mob ? { textAlign: 'center' } : {}}>Ingyenes visszahívás</BtnDark>
              <BtnOutline onClick={() => navigate('sellers')} style={mob ? { textAlign: 'center' } : {}}>Hirdessen nálunk</BtnOutline>
            </div>
          </Reveal>
        </section>

      </main>
      );
    };

    /* ═══════════════════════════════════════════════════════════
       APP — Router + Root render
    ═══════════════════════════════════════════════════════════ */

    const App = () => {
      const [page, setPage] = React.useState('home');
      const [selectedProp, setSelectedProp] = React.useState(null);

      const navigate = (pg, prop = null) => {
        setPage(pg);
        if (prop !== null) setSelectedProp(prop);
        window.scrollTo({ top: 0 });
      };

      const pageProps = { navigate, currentPage: page, selectedProp };

      const renderPage = () => {
        switch (page) {
          case 'home':       return <HomePage {...pageProps} />;
          case 'properties': return <PropertiesPagePremium {...pageProps} />;
          case 'detail':     return <PropertyDetailPage {...pageProps} />;
          case 'sellers':    return <SellersPage {...pageProps} />;
          case 'buyers':     return <BuyersPage {...pageProps} />;
          case 'about':      return <AboutPage {...pageProps} />;
          case 'contact':    return <ContactPage {...pageProps} />;
          default:           return <HomePage {...pageProps} />;
        }
      };

      return (
        <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
          <Nav currentPage={page} navigate={navigate} />
          <div style={{ flex: 1 }}>{renderPage()}</div>
          <Footer navigate={navigate} />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
