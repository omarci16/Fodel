    // Mobile breakpoint hook
    const useIsMobile = () => {
      const [mob, setMob] = React.useState(() => window.innerWidth < 768);
      React.useEffect(() => {
        const fn = () => setMob(window.innerWidth < 768);
        window.addEventListener('resize', fn, { passive: true });
        return () => window.removeEventListener('resize', fn);
      }, []);
      return mob;
    };

    const useTouchParallax = () => {
      const [enabled, setEnabled] = React.useState(() => {
        const coarse = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
        return coarse || window.innerWidth <= 1024;
      });
      React.useEffect(() => {
        const media = window.matchMedia('(hover: none) and (pointer: coarse)');
        const sync = () => setEnabled(media.matches || window.innerWidth <= 1024);
        sync();
        if (media.addEventListener) media.addEventListener('change', sync);
        else media.addListener(sync);
        window.addEventListener('resize', sync, { passive: true });
        return () => {
          if (media.removeEventListener) media.removeEventListener('change', sync);
          else media.removeListener(sync);
          window.removeEventListener('resize', sync);
        };
      }, []);
      return enabled;
    };

    const useParallaxShift = (enabled) => {
      const ref = React.useRef(null);
      React.useEffect(() => {
        const el = ref.current;
        if (!el) return;
        if (!enabled) {
          el.style.setProperty('--parallax-shift', '0px');
          return;
        }

        let ticking = false;
        const update = () => {
          ticking = false;
          const rect = el.getBoundingClientRect();
          const viewport = window.innerHeight || 1;
          const progress = (viewport - rect.top) / (viewport + rect.height);
          const shift = (progress - 0.5) * 90;
          el.style.setProperty('--parallax-shift', `${shift.toFixed(2)}px`);
        };
        const requestUpdate = () => {
          if (ticking) return;
          ticking = true;
          window.requestAnimationFrame(update);
        };

        update();
        window.addEventListener('scroll', requestUpdate, { passive: true });
        window.addEventListener('resize', requestUpdate, { passive: true });
        return () => {
          window.removeEventListener('scroll', requestUpdate);
          window.removeEventListener('resize', requestUpdate);
        };
      }, [enabled]);
      return ref;
    };

        const el = ref.current; if (!el) return;
        const obs = new IntersectionObserver(
          ([e]) => { if (e.isIntersecting) { setVis(true); obs.disconnect(); } },
          { threshold: 0.08 }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return [ref, vis];
    };

              <div style={{ flexShrink: 0, width: mob ? '100%' : '360px' }}>
                {subscribed ? (
                  <div style={{ padding: '20px 24px', border: '1px solid rgba(244,244,242,0.15)', color: 'rgba(244,244,242,0.65)', fontFamily: 'var(--sans)', fontWeight: 300, fontSize: '14px', lineHeight: 1.75 }}>
                    Köszönjük feliratkozását. Hamarosan értesítjük legújabb cikkeinkről.
                  </div>
                ) : (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                    <input type="email" placeholder="email@pelda.hu" value={email} onChange={e => setEmail(e.target.value)} aria-label="Email cím"
                      style={{ width: '100%', padding: '16px 20px', background: 'rgba(244,244,242,0.07)', border: '1px solid rgba(244,244,242,0.2)', color: 'var(--cream)', fontFamily: 'var(--sans)', fontWeight: 300, fontSize: '14px', outline: 'none' }} />
                    <BtnOutline light onClick={() => { if (email.includes('@')) setSubscribed(true); }} style={{ width: '100%', textAlign: 'center' }}>
                      Feliratkozás
                    </BtnOutline>
                    <p style={{ fontFamily: 'var(--sans)', fontWeight: 300, fontSize: '11px', color: 'rgba(244,244,242,0.28)', lineHeight: 1.65 }}>
                      Adatait harmadik félnek nem adjuk át. A GDPR és az adatvédelmi rendelet értelmében bármikor leiratkozhat.
                    </p>
                  </div>
                )}
              </div>
            </aside>

          </div>
        </main>
      );
    };

    /* ═══════════════════════════════════════════════════════════
       PAGE: BLOG POST DETAIL
    ═══════════════════════════════════════════════════════════ */

    const BlogPostPage = ({ navigate, selectedPost }) => {
      const mob = useIsMobile();
      const post = selectedPost || BLOG_POSTS[0];
      const related = BLOG_POSTS.filter(p => p.id !== post.id && (p.category === post.category || p.featured)).slice(0, 3);
      const [loaded, setLoaded] = React.useState(false);
      React.useEffect(() => { setLoaded(false); const t = setTimeout(() => setLoaded(true), 80); return () => clearTimeout(t); }, [post.id]);

      const renderBlock = (block, idx) => {
        if (block.type === 'lead') return (
          <p key={idx} style={{ fontFamily: 'var(--sans)', fontWeight: 300, fontSize: mob ? '17px' : '20px', lineHeight: 1.75, color: 'var(--ink)', borderLeft: '3px solid var(--accent)', paddingLeft: '22px', marginBottom: '36px', marginTop: '8px' }}>{block.text}</p>
        );
        if (block.type === 'h2') return (
          <h2 key={idx} style={{ fontFamily: 'var(--serif)', fontWeight: 700, fontSize: mob ? '22px' : '26px', color: 'var(--ink)', lineHeight: 1.2, marginTop: '44px', marginBottom: '14px' }}>{block.text}</h2>
        );
        if (block.type === 'p') return (
          <p key={idx} style={{ fontFamily: 'var(--sans)', fontWeight: 300, fontSize: mob ? '15px' : '16px', lineHeight: 1.95, color: 'var(--taupe)', marginBottom: '20px' }}>{block.text}</p>
        );
        if (block.type === 'quote') return (
          <blockquote key={idx} style={{ margin: '36px 0', padding: mob ? '24px 22px' : '32px 40px', background: 'rgba(236,237,239,0.6)', borderLeft: '3px solid var(--accent)', fontFamily: 'var(--serif)', fontWeight: 400, fontSize: mob ? '16px' : '19px', lineHeight: 1.65, color: 'var(--ink)', fontStyle: 'italic' }}>{block.text}</blockquote>
        );
        return null;
      };

      return (
        <main data-screen-label="Blog Post" itemScope itemType="https://schema.org/BlogPosting"
          style={{ paddingTop: mob ? '57px' : '80px', opacity: loaded ? 1 : 0, transition: 'opacity 0.55s ease' }}>

          {/* ── Breadcrumb ── */}
          <nav aria-label="Navigáció" style={{ padding: mob ? '14px 24px' : '18px 80px', borderBottom: '1px solid var(--border)', background: 'var(--cream)' }}>
            <ol itemScope itemType="https://schema.org/BreadcrumbList"
              style={{ display: 'flex', alignItems: 'center', gap: '8px', listStyle: 'none', fontFamily: 'var(--sans)', fontWeight: 300, fontSize: '11px', letterSpacing: '0.06em', color: 'var(--taupe)', flexWrap: 'wrap' }}>
              <li itemProp="itemListElement" itemScope itemType="https://schema.org/ListItem">
                <button onClick={() => navigate('home')} itemProp="name" style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--taupe)', fontFamily: 'inherit', fontSize: 'inherit', padding: 0 }}>Kezdőlap</button>
                <meta itemProp="position" content="1" />
              </li>
              <li aria-hidden="true" style={{ opacity: 0.35 }}>{'›'}</li>
              <li itemProp="itemListElement" itemScope itemType="https://schema.org/ListItem">
                <button onClick={() => navigate('blog')} itemProp="name" style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--taupe)', fontFamily: 'inherit', fontSize: 'inherit', padding: 0 }}>Blog</button>
                <meta itemProp="position" content="2" />
              </li>
              <li aria-hidden="true" style={{ opacity: 0.35 }}>{'›'}</li>
              <li itemProp="itemListElement" itemScope itemType="https://schema.org/ListItem">
                <span itemProp="name" style={{ color: 'var(--ink)', fontWeight: 400 }}>{post.category}</span>
                <meta itemProp="position" content="3" />
              </li>
            </ol>
          </nav>

          {/* ── Article header ── */}
          <header style={{ padding: mob ? '44px 24px 36px' : '80px 80px 56px', borderBottom: '1px solid var(--border)', background: 'linear-gradient(180deg, var(--linen) 0%, var(--cream) 100%)' }}>
            <div style={{ maxWidth: '820px' }}>
              <Eyebrow style={{ marginBottom: '16px' }}>{post.category}</Eyebrow>
              <h1 itemProp="headline"
                style={{ fontFamily: 'var(--serif)', fontWeight: 700, fontSize: mob ? 'clamp(28px, 9vw, 44px)' : 'clamp(36px, 4vw, 54px)', color: 'var(--ink)', lineHeight: 1.1, marginBottom: '22px' }}>
                {post.title}
              </h1>
              <GoldRule style={{ marginBottom: '22px' }} />
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: mob ? '4px 0' : '0 20px', fontFamily: 'var(--sans)', fontWeight: 300, fontSize: '12px', color: 'var(--taupe)', letterSpacing: '0.04em', alignItems: 'center' }}>
                <span itemProp="author" itemScope itemType="https://schema.org/Person">
                  <span itemProp="name">FODEL Szerkesztőség</span>
                </span>
                {!mob && <span style={{ opacity: 0.3, margin: '0 4px' }}>{'·'}</span>}
                {mob && <span style={{ display: 'block', width: '100%', height: '3px' }} />}
                <time itemProp="datePublished" dateTime={post.dateISO}>{post.date}</time>
                {!mob && <span style={{ opacity: 0.3, margin: '0 4px' }}>{'·'}</span>}
                <span>{post.readTime}</span>
              </div>
            </div>
          </header>

          {/* ── Hero image ── */}
          {(post.imgSrc || post.imgType) && (
            <div style={{ maxWidth: '920px', margin: '0 auto', padding: mob ? '32px 24px 0' : '60px 80px 0' }}>
              <div style={{ aspectRatio: '16/9', overflow: 'hidden' }}>
                {post.imgSrc ? (
                  <img src={post.imgSrc} alt={post.imgAlt || post.title} itemProp="image"
                    style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
                ) : (
                  <Placeholder type={post.imgType || 'landscape'} />
                )}
              </div>
            </div>
          )}

          {/* ── Article body ── */}
          <div itemProp="articleBody" style={{ maxWidth: '760px', margin: '0 auto', padding: mob ? '40px 24px 52px' : '64px 80px 80px' }}>
            {(post.content || []).map((block, idx) => renderBlock(block, idx))}

            <div style={{ borderTop: '1px solid var(--border)', paddingTop: '28px', marginTop: '44px', display: 'flex', flexDirection: mob ? 'column' : 'row', alignItems: mob ? 'flex-start' : 'center', justifyContent: 'space-between', gap: '16px' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                <Eyebrow>Kategória</Eyebrow>
                <div style={{ padding: '6px 16px', border: '1px solid var(--border)', fontFamily: 'var(--sans)', fontWeight: 300, fontSize: '12px', color: 'var(--taupe)' }}>{post.category}</div>
              </div>
              <TextBtn onClick={() => navigate('blog')}>Vissza a blogra</TextBtn>
            </div>
          </div>

          {/* ── Author box ── */}
          <div style={{ background: 'var(--linen)', borderTop: '1px solid var(--border)', borderBottom: '1px solid var(--border)' }}>
            <div style={{ maxWidth: '760px', margin: '0 auto', padding: mob ? '32px 24px' : '44px 80px', display: 'flex', gap: mob ? '18px' : '28px', alignItems: 'flex-start' }}>
              <div style={{ flexShrink: 0, width: mob ? '48px' : '58px', height: mob ? '48px' : '58px', background: 'var(--ink)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <span style={{ fontFamily: 'var(--serif)', fontWeight: 700, fontSize: mob ? '18px' : '22px', color: 'var(--cream)', letterSpacing: '0.06em' }}>F</span>
              </div>
              <div>
                <div style={{ fontFamily: 'var(--serif)', fontWeight: 700, fontSize: '16px', color: 'var(--ink)', marginBottom: '3px' }}>FODEL Szerkesztőség</div>
                <div style={{ fontFamily: 'var(--sans)', fontWeight: 300, fontSize: '10.5px', color: 'var(--taupe)', letterSpacing: '0.18em', textTransform: 'uppercase', marginBottom: '10px' }}>Almere-Buiten · Est. 2013</div>
                <p style={{ fontFamily: 'var(--sans)', fontWeight: 300, fontSize: '13px', lineHeight: 1.8, color: 'var(--taupe)', maxWidth: '520px' }}>
                  A FODEL szerkesztősége 2013 óta közvetít és elemez a holland-magyar ingatlanpiacon. Cikkeink forrásai: saját piaci tapasztalat, ügyfél-visszajelzések és ellenőrzött holland médiaforrások — minden idézett tartalom forrásmegjelöléssel jelenik meg.
                </p>
              </div>
            </div>
          </div>

          {/* ── Related posts ── */}
          {related.length > 0 && (
            <section aria-label="Kapcsolódó cikkek" style={{ padding: mob ? '48px 24px 72px' : '80px 80px 120px' }}>
              <Reveal>
                <Eyebrow style={{ marginBottom: '10px' }}>Kapcsolódó cikkek</Eyebrow>
                <h2 style={{ fontFamily: 'var(--serif)', fontWeight: 700, fontSize: mob ? '26px' : '32px', color: 'var(--ink)', lineHeight: 1.15, marginBottom: mob ? '28px' : '44px' }}>Olvassa tovább</h2>
              </Reveal>
              <div style={{ display: 'grid', gridTemplateColumns: mob ? '1fr' : 'repeat(3, minmax(0, 1fr))', gap: mob ? '24px' : '28px' }}>
                {related.map((p, i) => <BlogCard key={p.id} post={p} navigate={navigate} delay={i + 1} />)}
              </div>
            </section>
          )}

          {/* ── CTA band ── */}
          <div style={{ background: 'var(--ink)', padding: mob ? '52px 28px' : '88px 80px', textAlign: mob ? 'left' : 'center' }}>
            <Reveal>
              <Eyebrow center={!mob} style={{ marginBottom: '14px', color: 'rgba(244,244,242,0.42)' }}>FODEL INGATLAN</Eyebrow>
              <div style={{ fontFamily: 'var(--serif)', fontWeight: 700, fontSize: mob ? '26px' : 'clamp(28px, 3.2vw, 44px)', color: 'var(--cream)', lineHeight: 1.12, marginBottom: '14px', maxWidth: '600px', margin: mob ? '0 0 14px' : '0 auto 14px' }}>
                Kérdése van? Forduljon hozzánk bizalommal.
              </div>
              <p style={{ fontFamily: 'var(--sans)', fontWeight: 300, fontSize: '14px', lineHeight: 1.85, color: 'rgba(244,244,242,0.48)', maxWidth: '520px', margin: mob ? '14px 0 32px' : '14px auto 36px' }}>
                A hívást természetesen mi fizetjük. Munkanapokon 08:00–18:00 között elérhetők vagyunk — telefonon, e-mailben és az ingyenes visszahívási rendszeren keresztül.
              </p>
              <div style={{ display: 'flex', flexDirection: mob ? 'column' : 'row', gap: '12px', justifyContent: mob ? 'flex-start' : 'center' }}>
                <BtnOutline light onClick={() => navigate('contact')} style={mob ? { textAlign: 'center' } : {}}>Ingyenes visszahívás</BtnOutline>
                <BtnOutline light onClick={() => navigate('properties')} style={mob ? { textAlign: 'center' } : {}}>Ingatlanok böngészése</BtnOutline>
              </div>
            </Reveal>
          </div>

        </main>
      );
    };

    /* ═══════════════════════════════════════════════════════════
       APP — Router + Root render
    ═══════════════════════════════════════════════════════════ */

    const App = () => {
      const [page, setPage] = React.useState('home');
      const [selectedProp, setSelectedProp] = React.useState(null);
      const [selectedPost, setSelectedPost] = React.useState(null);
      const [searchFilters, setSearchFilters] = React.useState({});

      const navigate = (pg, prop = null, filters = null) => {
        setPage(pg);
        if (prop !== null) {
          if (pg === 'blog-post') setSelectedPost(prop);
          else setSelectedProp(prop);
        }
        if (filters !== null) setSearchFilters(filters);
        window.scrollTo({ top: 0 });
      };

      const pageProps = { navigate, currentPage: page, selectedProp, selectedPost, searchFilters };

      const renderPage = () => {
        switch (page) {
          case 'home':       return <HomePage {...pageProps} />;
          case 'properties': return <PropertiesPagePremium {...pageProps} />;
          case 'detail':     return <PropertyDetailPage {...pageProps} />;
          case 'sellers':    return <SellersPage {...pageProps} />;
          case 'buyers':     return <BuyersPage {...pageProps} />;
          case 'about':      return <AboutPage {...pageProps} />;
          case 'contact':    return <ContactPage {...pageProps} />;
          case 'blog':       return <BlogPage {...pageProps} />;
          case 'blog-post':  return <BlogPostPage {...pageProps} />;
          default:           return <HomePage {...pageProps} />;
        }
      };

      return (
        <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
          <Nav currentPage={page} navigate={navigate} />
          <div style={{ flex: 1 }}>{renderPage()}</div>
          <Footer navigate={navigate} />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
